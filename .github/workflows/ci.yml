name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race ./...

  check-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      needs_release: ${{ steps.compare.outputs.needs_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from code
        id: get_version
        run: |
          VERSION=$(grep -oP 'const Version = "\K[^"]+' main.go)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version in code: ${VERSION}"

      - name: Compare with latest release
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "none")
          echo "Latest release tag: ${LATEST}"
          CODE_VERSION="v${{ steps.get_version.outputs.version }}"
          if [ "${LATEST}" = "${CODE_VERSION}" ]; then
            echo "Version unchanged, no release needed."
            echo "needs_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: ${CODE_VERSION} (latest: ${LATEST})"
            echo "needs_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: [test, check-version]
    if: needs.check-version.outputs.needs_release == 'true'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: freebsd
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w -X main.version=${VERSION} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "open-mirror-${GOOS}-${GOARCH}${EXT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-mirror-${{ matrix.goos }}-${{ matrix.goarch }}
          path: open-mirror-*

  release:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.needs_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          echo "Creating release ${VERSION}"
          ls -la artifacts/
          gh release create "${VERSION}" artifacts/open-mirror-* \
            --title "open-mirror ${VERSION}" \
            --generate-notes

  docker:
    runs-on: ubuntu-latest
    needs: [test, check-version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.check-version.outputs.version }},enable=${{ needs.check-version.outputs.needs_release == 'true' }}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
